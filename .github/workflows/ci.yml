name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Validate Python sources
        run: python -m compileall -q backend start.py
      - name: Run tests
        env:
          TEST_MODE: "1"
        run: python -m unittest discover -s tests -v
      - name: Validate browser scripts
        run: node --check frontend/js/app.js

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install security tools
        run: pip install bandit safety
      - name: Bandit (static analysis)
        run: bandit -r backend/ -f json -o bandit-report.json || true
      - name: Safety (dependency vulnerabilities)
        run: safety check --json --output safety-report.json || true
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: *-report.json
